name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.js"
      - "Dockerfile"
      - "nginx.conf"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.js"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/quantmate-portal

# ---------------------------------------------------------------------------
# Stage 1: CI — Lint & Type Check
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (non-blocking, temporarily paused)
        run: npm run lint || true

      - name: TypeScript type check (non-blocking, temporarily paused)
        run: npx tsc -p tsconfig.test.json --noEmit || true

# ---------------------------------------------------------------------------
# Stage 1: CI — Unit Tests (needs lint)
# ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run --reporter=default --reporter=junit --outputFile=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

# ---------------------------------------------------------------------------
# Stage 2: Publish — Build & push Docker image to GHCR (only on main push)
# ---------------------------------------------------------------------------
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image build metadata
        id: build_meta
        run: echo "image_build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            IMAGE_BUILD_TIME=${{ steps.build_meta.outputs.image_build_time }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ---------------------------------------------------------------------------
# Stage 3: Deploy Staging (only after publish succeeds)
# ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy Portal to Staging
    runs-on: ubuntu-latest
    needs: publish
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: sha-${{ github.sha }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: GITHUB_OWNER,IMAGE_TAG
          script: |
            set -e
            cd /opt/quantmate

            echo "==> Pulling portal image tag: $IMAGE_TAG"
            GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
              docker compose -f docker-compose.staging.yml pull portal

            echo "==> Restarting portal service"
            GITHUB_OWNER=$GITHUB_OWNER IMAGE_TAG=$IMAGE_TAG \
              docker compose -f docker-compose.staging.yml up -d portal --remove-orphans

            echo "==> Waiting for portal to start"
            sleep 10
            curl -sf http://localhost:80/ || curl -sf http://localhost:5173/ || exit 1
            echo "Portal staging deploy successful: $IMAGE_TAG"
