name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  deploy-staging:
    name: Deploy Portal Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tags
        run: echo "tag=staging-$(echo $GITHUB_SHA | head -c 8)" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/quantmate
            
            docker pull ${{ env.IMAGE }}:${{ steps.tags.outputs.tag }}
            docker tag ${{ env.IMAGE }}:${{ steps.tags.outputs.tag }} ${{ env.IMAGE }}:staging-latest
            
            docker compose -f docker-compose.staging.yml up -d portal --remove-orphans
            
            sleep 5
            curl -sf http://localhost:3000/ || exit 1
            echo "Portal staging deploy successful"
