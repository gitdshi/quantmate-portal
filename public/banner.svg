<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 方案1 营销横幅 1200x400 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg1)"/>
  <!-- 大图标 -->
  <circle cx="250" cy="200" r="100" fill="white" fill-opacity="0.15"/>
  <circle cx="250" cy="200" r="80" fill="none" stroke="white" stroke-width="10"/>
  <polyline points="150,220 180,170 220,190 290,110"
            fill="none"
            stroke="white"
            stroke-width="12"
            stroke-linecap="round"
            stroke-linejoin="round"/>
  <circle cx="150" cy="220" r="12" fill="white"/>
  <circle cx="180" cy="170" r="12" fill="white"/>
  <circle cx="220" cy="190" r="12" fill="#fbbf24"/>
  <circle cx="290" cy="110" r="12" fill="#34d399"/>
  <!-- 标题 -->
  <text x="450" y="180" font-family="Inter, -apple-system, sans-serif" font-size="80" font-weight="700" fill="white">TraderMate</text>
  <text x="450" y="250" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#bfdbfe">智能量化交易 · 专业策略分析</text>
  <!-- 装饰点 -->
  <circle cx="1050" cy="80" r="8" fill="white" opacity="0.3"/>
  <circle cx="1070" cy="120" r="12" fill="white" opacity="0.2"/>
  <circle cx="1090" cy="60" r="6" fill="white" opacity="0.4"/>
  <circle cx="1120" cy="160" r="10" fill="white" opacity="0.25"/>
</svg>